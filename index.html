<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prompt Library</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #e5e7eb;
      --hover: #f9fafb;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .navbar {
      border-bottom: 1px solid var(--border);
    }

    .main-container {
      max-width: 900px;
      margin: auto;
      padding: 40px 20px 0px;
    }

    .prompt-card {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
      transition: 0.2s;
    }

    .prompt-card:hover {
      background: var(--hover);
    }

    .badge-outline {
      padding: 4px 8px;
      border-radius: 8px;
      font-size: 0.75rem;
      border: 1px solid currentColor;
      color: inherit;
    }

    .badge-writing { color: #1d4ed8; border-color: #1d4ed8; background-color: rgba(37, 99, 235, 0.1); }
    .badge-coding { color: #047857; border-color: #047857; background-color: rgba(22, 163, 74, 0.1); }
    .badge-marketing { color: #b45309; border-color: #b45309; background-color: rgba(217, 119, 6, 0.1); }
    .badge-learning { color: #0c4a6e; border-color: #0c4a6e; background-color: rgba(8, 145, 178, 0.1); }
    .badge-career { color: #991b1b; border-color: #991b1b; background-color: rgba(220, 38, 38, 0.1); }
    .badge-productivity { color: #4b5563; border-color: #4b5563; background-color: rgba(107, 114, 128, 0.1); }

    .btn-ghost {
      border: 1px solid var(--border);
      background: transparent;
      border-radius: 8px;
      padding: 6px 12px;
    }
        /* Dark Mode */
    body.dark {
      --bg: #0f172a;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --border: #1f2933;
      --hover: #1e293b;
    }

    body.dark .navbar,
    body.dark .prompt-card {
      background: var(--bg);
      border-color: var(--border);
    }

    body.dark .prompt-card {
      box-shadow: 0 0 0 1px var(--border);
    }

    .navbar,
    .prompt-card,
    .main-container,
    .promptList,
    .container,
    .form-control,
    .btn-ghost {
      color: var(--text);
    }

    .text-muted {
      color: var(--muted) !important;
    }

    .form-control {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      box-shadow: none;
    }

    .form-control:focus {
      border-color: var(--border);
      box-shadow: 0 0 0 0.2rem rgba(148, 163, 184, 0.25);
    }

    .btn-ghost {
      border-color: var(--border);
      color: var(--text);
    }
  </style>
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar px-4 py-3">
    <div class="container-fluid d-flex justify-content-between align-items-center">
      <span class="fw-semibold">Prompt Library</span>

      <!-- Toggle -->
      <button id="toggleDark" class="btn-ghost">
        <i id="themeIcon" class="bi bi-moon"></i>
      </button>
    </div>
  </nav>

<section class="promptList">
  <div class="container">
    <div class="main-container">
      <input id="searchInput" class="form-control mb-4" placeholder="Search prompts...">
    </div>
    <div id="promptList" class="d-flex flex-column gap-3"></div>
  </div>
</section>


<script>
  let promptsData = [];

  // Fetch JSON
  fetch('prompts.json')
    .then(res => res.json())
    .then(data => {
      promptsData = data;
      renderPrompts(data);
    });

  // Render function
  function renderPrompts(data) {
    const container = document.getElementById('promptList');
    container.innerHTML = '';

    data.forEach(item => {
      container.innerHTML += `
        <div class="prompt-card">
          <div class="d-flex justify-content-between align-items-start">
            <div>
              <div class="mb-2">
                <span class="badge-outline ${item.badgeClass}">
                  ${item.category}
                </span>
              </div>
              <div class="fw-semibold">${item.title}</div>
              <div class="text-muted small">${item.description}</div>
            </div>
            <button class="btn-ghost copy-btn" data-prompt="${encodeURIComponent(item.prompt)}">
              Copy
            </button>
          </div>
        </div>
      `;
    });
  }

  // Copy
  function copyPrompt(text) {
    navigator.clipboard.writeText(text);
    alert("Prompt copied!");
  }

  // Copy buttons (safe with multiline content)
  document.getElementById('promptList').addEventListener('click', function (event) {
    const btn = event.target.closest('.copy-btn');
    if (!btn) return;
    const encoded = btn.getAttribute('data-prompt');
    if (!encoded) return;
    copyPrompt(decodeURIComponent(encoded));
  });

  // Search
  document.getElementById("searchInput").addEventListener("keyup", function () {
    const value = this.value.toLowerCase();

    const filtered = promptsData.filter(item =>
      item.title.toLowerCase().includes(value) ||
      item.description.toLowerCase().includes(value) ||
      item.category.toLowerCase().includes(value)
    );

    renderPrompts(filtered);
  });

      // Dark mode toggle
    const toggleBtn = document.getElementById("toggleDark");
    const icon = document.getElementById("themeIcon");

    toggleBtn.addEventListener("click", () => {
      document.body.classList.toggle("dark");

      if (document.body.classList.contains("dark")) {
        icon.classList.replace("bi-moon", "bi-sun");
      } else {
        icon.classList.replace("bi-sun", "bi-moon");
      }
    });
</script>

</body>
</html>
