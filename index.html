<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prompt Library</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #e5e7eb;
      --hover: #f9fafb;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .navbar {
      border-bottom: 1px solid var(--border);
    }

    .main-container {
      max-width: 900px;
      margin: auto;
      padding: 40px 20px;
    }

    .prompt-card {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
      transition: 0.2s;
    }

    .prompt-card:hover {
      background: var(--hover);
    }

    .badge-outline {
      padding: 4px 8px;
      border-radius: 8px;
      font-size: 0.75rem;
      border: 1px solid;
    }

    .badge-writing { color: #2563eb; border-color: #2563eb; }
    .badge-coding { color: #16a34a; border-color: #16a34a; }
    .badge-marketing { color: #d97706; border-color: #d97706; }
    .badge-learning { color: #0891b2; border-color: #0891b2; }
    .badge-career { color: #dc2626; border-color: #dc2626; }
    .badge-productivity { color: #6b7280; border-color: #6b7280; }

    .btn-ghost {
      border: 1px solid var(--border);
      background: transparent;
      border-radius: 8px;
      padding: 6px 12px;
    }
  </style>
</head>

<body>

<nav class="navbar px-4 py-3">
  <span class="fw-semibold">Prompt Library</span>
</nav>

<div class="main-container">

  <input id="searchInput" class="form-control mb-4" placeholder="Search prompts...">

  <div id="promptList" class="d-flex flex-column gap-3"></div>

</div>

<script>
  let promptsData = [];

  // Fetch JSON
  fetch('prompts.json')
    .then(res => res.json())
    .then(data => {
      promptsData = data;
      renderPrompts(data);
    });

  // Render function
  function renderPrompts(data) {
    const container = document.getElementById('promptList');
    container.innerHTML = '';

    data.forEach(item => {
      container.innerHTML += `
        <div class="prompt-card">
          <div class="d-flex justify-content-between">
            <div>
              <div class="fw-semibold">${item.title}</div>
              <div class="text-muted small">${item.description}</div>
              <div class="mt-2">
                <span class="badge-outline ${item.badgeClass}">
                  ${item.category}
                </span>
              </div>
            </div>
            <button class="btn-ghost" onclick="copyPrompt('${item.prompt}')">
              Copy
            </button>
          </div>
        </div>
      `;
    });
  }

  // Copy
  function copyPrompt(text) {
    navigator.clipboard.writeText(text);
    alert("Prompt copied!");
  }

  // Search
  document.getElementById("searchInput").addEventListener("keyup", function () {
    const value = this.value.toLowerCase();

    const filtered = promptsData.filter(item =>
      item.title.toLowerCase().includes(value) ||
      item.description.toLowerCase().includes(value) ||
      item.category.toLowerCase().includes(value)
    );

    renderPrompts(filtered);
  });
</script>

</body>
</html>
